<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraGPT Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .sidebar { background-color: #111827; color: white; width: 250px; height: 100vh; position: fixed; }
        .main-content { margin-left: 250px; padding: 24px; width: calc(100% - 250px); }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .table-th { background-color: #f9fafb; text-align: left; padding: 12px; font-weight: 600; color: #4b5563; border-bottom: 2px solid #e5e7eb; }
        .table-td { padding: 12px; border-bottom: 1px solid #e5e7eb; color: #1f2937; }
        .badge { padding: 4px 8px; border-radius: 9999px; font-size: 12px; font-weight: bold; }
        .badge-free { background: #e5e7eb; color: #374151; }
        .badge-go { background: #dbeafe; color: #1e40af; }
        .badge-plus { background: #f3e8ff; color: #6b21a8; }
        .badge-pro { background: #fef3c7; color: #92400e; }
        .btn-approve { background: #10a37f; color: white; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; border: none;}
        .btn-approve:hover { background: #0d8c6d; }
        .btn-reject { background: #ef4444; color: white; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; margin-left: 5px;}
        
        /* Login Overlay */
        #adminLoginScreen { position: fixed; inset: 0; background-color: #111827; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="adminLoginScreen">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 text-center">
            <img src="/logo.png" alt="AuraGPT" class="w-16 h-16 mx-auto mb-4 mix-blend-darken">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Admin Login</h2>
            <input type="password" id="adminPassInput" placeholder="Enter Admin Password" class="w-full p-3 border rounded-lg mb-4 outline-none focus:border-[#10a37f]">
            <button onclick="adminLogin()" id="loginBtn" class="w-full bg-[#10a37f] text-white font-bold p-3 rounded-lg hover:bg-[#0d8c6d] transition">Access Dashboard</button>
        </div>
    </div>

    <div class="sidebar p-5 hidden" id="dashboardSidebar">
        <div class="flex items-center gap-3 mb-10">
            <img src="/logo.png" alt="Logo" class="w-10 h-10 bg-white rounded-full p-1">
            <h2 class="text-xl font-bold tracking-wider">Aura Admin</h2>
        </div>
        <ul class="space-y-4">
            <li class="p-3 bg-gray-800 rounded-lg cursor-pointer"><i class="fa-solid fa-chart-line mr-2"></i> Dashboard</li>
            <li class="p-3 hover:bg-gray-800 rounded-lg cursor-pointer text-gray-300 mt-10 text-red-400" onclick="adminLogout()"><i class="fa-solid fa-right-from-bracket mr-2"></i> Logout</li>
        </ul>
    </div>

    <div class="main-content hidden" id="dashboardContent">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Dashboard Overview</h1>
            <div class="bg-white px-4 py-2 rounded-lg shadow-sm font-bold text-gray-700">
                <i class="fa-solid fa-user-shield text-[#10a37f] mr-2"></i> Super Admin
            </div>
        </header>

        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="card border-l-4 border-[#10a37f] mb-0"><h3 class="text-gray-500 text-sm font-bold">TOTAL USERS</h3><p class="text-3xl font-bold mt-2" id="totalUsers">0</p></div>
            <div class="card border-l-4 border-purple-500 mb-0"><h3 class="text-gray-500 text-sm font-bold">PENDING PAYMENTS</h3><p class="text-3xl font-bold mt-2" id="pendingPayments">0</p></div>
            <div class="card border-l-4 border-blue-500 mb-0"><h3 class="text-gray-500 text-sm font-bold">VIDEOS GENERATED</h3><p class="text-3xl font-bold mt-2" id="totalVideos">0</p></div>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-4 text-gray-800"><i class="fa-solid fa-clock-rotate-left text-orange-500 mr-2"></i> Subscription Requests</h2>
            <table class="w-full border-collapse">
                <thead><tr><th class="table-th">Email</th><th class="table-th">bKash/Nagad No.</th><th class="table-th">TrxID</th><th class="table-th">Requested Plan</th><th class="table-th">Action</th></tr></thead>
                <tbody id="paymentTableBody"></tbody>
            </table>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-4 text-gray-800"><i class="fa-solid fa-users text-blue-500 mr-2"></i> User Database</h2>
            <table class="w-full border-collapse">
                <thead><tr><th class="table-th">Name</th><th class="table-th">Email</th><th class="table-th">Plan</th><th class="table-th">Text Used</th><th class="table-th">Video Used</th></tr></thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Check if already logged in
        const savedPass = localStorage.getItem('auraAdminPass');
        if(savedPass) { loadAdminData(savedPass); }

        async function adminLogin() {
            const pass = document.getElementById('adminPassInput').value;
            if(!pass) return alert("Please enter password!");
            
            document.getElementById('loginBtn').innerText = "Checking...";
            
            // Validate password with backend
            const res = await fetch('/api/admin/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pass })
            });

            if(res.ok) {
                localStorage.setItem('auraAdminPass', pass);
                loadAdminData(pass);
            } else {
                alert("Incorrect Password!");
                document.getElementById('loginBtn').innerText = "Access Dashboard";
            }
        }

        function adminLogout() {
            localStorage.removeItem('auraAdminPass');
            location.reload();
        }

        async function loadAdminData(password) {
            try {
                // Send password in headers for security
                const res = await fetch('/api/admin/dashboard-data', {
                    headers: { 'Authorization': password }
                });
                
                if(res.status === 401) { adminLogout(); return; } // Password changed or invalid
                
                const data = await res.json();

                // Reveal Dashboard
                document.getElementById('adminLoginScreen').style.display = 'none';
                document.getElementById('dashboardSidebar').classList.remove('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');

                // Update Stats
                document.getElementById('totalUsers').innerText = data.users.length;
                document.getElementById('pendingPayments').innerText = data.payments.length;
                document.getElementById('totalVideos').innerText = data.users.reduce((acc, user) => acc + (user.video_count || 0), 0);

                // Populate Payments
                const pBody = document.getElementById('paymentTableBody');
                pBody.innerHTML = data.payments.length === 0 ? '<tr><td colspan="5" class="table-td text-center text-gray-500">No pending requests.</td></tr>' : '';
                data.payments.forEach(p => {
                    const planColor = p.plan_requested === 'PRO' ? 'text-red-600' : (p.plan_requested === 'PLUS' ? 'text-purple-600' : 'text-blue-600');
                    pBody.innerHTML += `
                        <tr>
                            <td class="table-td font-medium">${p.user_email}</td><td class="table-td">${p.phone}</td>
                            <td class="table-td font-mono bg-gray-50 px-2 py-1 rounded">${p.trx_id}</td>
                            <td class="table-td font-bold ${planColor}">${p.plan_requested}</td>
                            <td class="table-td">
                                <button onclick="processPayment(${p.id}, '${p.user_email}', '${p.plan_requested}', 'approve')" class="btn-approve">Approve</button>
                                <button onclick="processPayment(${p.id}, '${p.user_email}', '${p.plan_requested}', 'reject')" class="btn-reject"><i class="fa-solid fa-xmark"></i></button>
                            </td>
                        </tr>
                    `;
                });

                // Populate Users
                const uBody = document.getElementById('userTableBody');
                uBody.innerHTML = '';
                data.users.forEach(u => {
                    let badgeClass = u.plan === 'PRO' ? 'badge-pro' : (u.plan === 'PLUS' ? 'badge-plus' : (u.plan === 'GO' ? 'badge-go' : 'badge-free'));
                    uBody.innerHTML += `
                        <tr><td class="table-td font-medium">${u.name}</td><td class="table-td">${u.email}</td>
                        <td class="table-td"><span class="badge ${badgeClass}">${u.plan}</span></td>
                        <td class="table-td">${u.msg_count}</td><td class="table-td">${u.video_count}</td></tr>
                    `;
                });
            } catch (e) { console.error("Data load failed", e); }
        }

        async function processPayment(paymentId, email, plan, action) {
            const password = localStorage.getItem('auraAdminPass');
            if(!confirm(action === 'approve' ? `Approve ${plan} plan for ${email}?` : `Reject payment?`)) return;

            const res = await fetch('/api/admin/process-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': password },
                body: JSON.stringify({ paymentId, email, plan, action })
            });

            if(res.ok) {
                alert(`Successfully ${action}d!`);
                loadAdminData(password); // Reload
            } else { alert("Action failed or Unauthorized."); }
        }
    </script>
</body>
</html>
