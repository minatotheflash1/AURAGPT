<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Admin Control</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f3f4f6; 
        }

        .sidebar { 
            background-color: #111827; 
            color: white; 
            width: 250px; 
            height: 100vh; 
            position: fixed; 
        }

        .main-content { 
            margin-left: 250px; 
            padding: 24px; 
            width: calc(100% - 250px); 
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            margin-bottom: 24px; 
        }

        .table-th { 
            background-color: #f9fafb; 
            text-align: left; 
            padding: 12px; 
            font-weight: 600; 
            color: #4b5563; 
            border-bottom: 2px solid #e5e7eb; 
        }

        .table-td { 
            padding: 12px; 
            border-bottom: 1px solid #e5e7eb; 
            color: #1f2937; 
        }

        .badge { 
            padding: 4px 10px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: bold; 
            display: inline-block; 
        }

        .badge-FREE { background: #e5e7eb; color: #374151; }
        .badge-GO { background: #dbeafe; color: #1e40af; }
        .badge-PLUS { background: #f3e8ff; color: #6b21a8; }
        .badge-PRO { background: #fef3c7; color: #92400e; }
        .badge-Admin { background: #fee2e2; color: #b91c1c; border: 1px solid #f87171; }
        
        .badge-Owner { 
            background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff); 
            background-size: 400%; 
            color: white; 
            animation: glowingOwner 4s linear infinite; 
            box-shadow: 0 0 10px rgba(255,115,0,0.8); 
        }

        @keyframes glowingOwner { 
            0% { background-position: 0% 0%; } 
            100% { background-position: 100% 0%; } 
        }

        .btn-approve { 
            background: #10a37f; 
            color: white; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            border: none; 
        }

        .btn-approve:hover { 
            background: #0d8c6d; 
        }

        .btn-reject { 
            background: #ef4444; 
            color: white; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            margin-left: 5px; 
            transition: 0.2s; 
        }

        .btn-reject:hover { 
            background: #dc2626; 
        }

        #adminLoginScreen { 
            position: fixed; 
            inset: 0; 
            background-color: #111827; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
    </style>
</head>
<body>

    <div id="adminLoginScreen">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 text-center">
            <img src="/logo.png" alt="AuraGPT" class="w-16 h-16 mx-auto mb-4 mix-blend-darken">
            
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Admin Login</h2>
            
            <input type="password" id="adminPassInput" placeholder="Enter Admin Password" class="w-full p-3 border rounded-lg mb-4 outline-none focus:border-[#10a37f] transition">
            
            <button onclick="adminLogin()" id="loginBtn" class="w-full bg-[#10a37f] text-white font-bold p-3 rounded-lg hover:bg-[#0d8c6d] transition">
                Access Dashboard
            </button>
        </div>
    </div>

    <div class="sidebar p-5 hidden" id="dashboardSidebar">
        <div class="flex items-center gap-3 mb-10">
            <img src="/logo.png" alt="Logo" class="w-10 h-10 bg-white rounded-full p-1">
            <h2 class="text-xl font-bold tracking-wider">Aura Admin</h2>
        </div>
        
        <ul class="space-y-4">
            <li class="p-3 bg-gray-800 rounded-lg cursor-pointer transition">
                <i class="fa-solid fa-chart-line mr-2"></i> Dashboard
            </li>
            
            <li class="p-3 hover:bg-gray-800 rounded-lg cursor-pointer text-gray-300 mt-10 text-red-400 transition" onclick="adminLogout()">
                <i class="fa-solid fa-right-from-bracket mr-2"></i> Logout
            </li>
        </ul>
    </div>

    <div class="main-content hidden" id="dashboardContent">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Dashboard Overview</h1>
            <div class="bg-white px-4 py-2 rounded-lg shadow-sm font-bold text-gray-700">
                <i class="fa-solid fa-user-shield text-[#10a37f] mr-2"></i> Admin Panel
            </div>
        </header>

        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="card border-l-4 border-[#10a37f] mb-0">
                <h3 class="text-gray-500 text-sm font-bold">TOTAL USERS</h3>
                <p class="text-3xl font-bold mt-2" id="totalUsers">0</p>
            </div>
            
            <div class="card border-l-4 border-purple-500 mb-0">
                <h3 class="text-gray-500 text-sm font-bold">PENDING PAYMENTS</h3>
                <p class="text-3xl font-bold mt-2" id="pendingPayments">0</p>
            </div>
            
            <div class="card border-l-4 border-blue-500 mb-0">
                <h3 class="text-gray-500 text-sm font-bold">VIDEOS</h3>
                <p class="text-3xl font-bold mt-2" id="totalVideos">0</p>
            </div>
            
            <div class="card border-l-4 border-red-500 mb-0">
                <h3 class="text-gray-500 text-sm font-bold">MAINTENANCE</h3>
                <div class="mt-2 flex items-center justify-between">
                    <span id="maintenanceStatusTxt" class="font-bold text-xl text-green-500">OFF</span>
                    <button onclick="toggleMaintenance()" class="bg-gray-800 text-white px-3 py-1 rounded hover:bg-gray-700 transition font-bold text-sm shadow">
                        Toggle
                    </button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-4 text-gray-800">
                <i class="fa-solid fa-clock-rotate-left text-orange-500 mr-2"></i> Subscription Requests
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr>
                            <th class="table-th">Email</th>
                            <th class="table-th">bKash/Nagad No.</th>
                            <th class="table-th">TrxID</th>
                            <th class="table-th">Requested Plan</th>
                            <th class="table-th">Action</th>
                        </tr>
                    </thead>
                    <tbody id="paymentTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-4 text-gray-800">
                <i class="fa-solid fa-users text-blue-500 mr-2"></i> User Database & Badges
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr>
                            <th class="table-th">Name</th>
                            <th class="table-th">Email</th>
                            <th class="table-th">Current Badge</th>
                            <th class="table-th">Assign New Badge</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const savedPass = localStorage.getItem('auraAdminPass');
        
        if (savedPass) {
            loadAdminData(savedPass);
        }

        async function adminLogin() {
            const pass = document.getElementById('adminPassInput').value;
            
            if (!pass) {
                return alert("Please enter password!");
            }
            
            document.getElementById('loginBtn').innerText = "Checking...";
            
            try {
                const res = await fetch('/api/admin/login', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ password: pass }) 
                });
                
                if (res.ok) { 
                    localStorage.setItem('auraAdminPass', pass); 
                    loadAdminData(pass); 
                } else { 
                    alert("Incorrect Password!"); 
                    document.getElementById('loginBtn').innerText = "Access Dashboard"; 
                }
            } catch (e) { 
                alert("Connection error."); 
                document.getElementById('loginBtn').innerText = "Access Dashboard"; 
            }
        }

        function adminLogout() { 
            localStorage.removeItem('auraAdminPass'); 
            location.reload(); 
        }

        async function fetchMaintenanceStatus() {
            const password = localStorage.getItem('auraAdminPass');
            try {
                const res = await fetch('/api/admin/maintenance-status', { 
                    headers: { 'Authorization': password } 
                });
                
                const data = await res.json();
                const statusTxt = document.getElementById('maintenanceStatusTxt');
                
                if (data.maintenance) { 
                    statusTxt.innerText = "ON"; 
                    statusTxt.className = "font-bold text-xl text-red-600"; 
                } else { 
                    statusTxt.innerText = "OFF"; 
                    statusTxt.className = "font-bold text-xl text-green-500"; 
                }
            } catch(e) { 
                console.error("Failed to fetch maintenance status"); 
            }
        }

        async function toggleMaintenance() {
            const password = localStorage.getItem('auraAdminPass');
            
            if(!confirm("Are you sure you want to toggle Maintenance Mode?")) {
                return;
            }
            
            try {
                const res = await fetch('/api/admin/toggle-maintenance', { 
                    method: 'POST', 
                    headers: { 'Authorization': password } 
                });
                
                if(res.ok) { 
                    alert("Maintenance Mode Toggled Successfully!"); 
                    fetchMaintenanceStatus(); 
                }
            } catch(e) { 
                alert("Failed to toggle maintenance mode."); 
            }
        }

        async function loadAdminData(password) {
            try {
                const res = await fetch('/api/admin/dashboard-data', { 
                    headers: { 'Authorization': password } 
                });
                
                if (res.status === 401) { 
                    adminLogout(); 
                    return; 
                }
                
                const data = await res.json();

                document.getElementById('adminLoginScreen').style.display = 'none';
                document.getElementById('dashboardSidebar').classList.remove('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');

                document.getElementById('totalUsers').innerText = data.users.length;
                document.getElementById('pendingPayments').innerText = data.payments.length;
                document.getElementById('totalVideos').innerText = data.users.reduce((acc, user) => acc + (user.video_count || 0), 0);

                fetchMaintenanceStatus();

                const pBody = document.getElementById('paymentTableBody');
                pBody.innerHTML = data.payments.length === 0 ? '<tr><td colspan="5" class="table-td text-center text-gray-500 py-4">No pending requests.</td></tr>' : '';
                
                data.payments.forEach(p => {
                    const planColor = p.plan_requested === 'PRO' ? 'text-red-600' : (p.plan_requested === 'PLUS' ? 'text-purple-600' : 'text-blue-600');
                    pBody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="table-td font-medium">${p.user_email}</td>
                            <td class="table-td">${p.phone}</td>
                            <td class="table-td font-mono bg-gray-50 px-2 py-1 rounded">${p.trx_id}</td>
                            <td class="table-td font-bold ${planColor}">${p.plan_requested}</td>
                            <td class="table-td whitespace-nowrap">
                                <button onclick="processPayment(${p.id}, '${p.user_email}', '${p.plan_requested}', 'approve')" class="btn-approve">Approve</button>
                                <button onclick="processPayment(${p.id}, '${p.user_email}', '${p.plan_requested}', 'reject')" class="btn-reject"><i class="fa-solid fa-xmark"></i></button>
                            </td>
                        </tr>`;
                });

                const uBody = document.getElementById('userTableBody'); 
                uBody.innerHTML = '';
                
                data.users.forEach(u => {
                    let currentBadge = u.badge || 'FREE';
                    uBody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="table-td font-medium">${u.name}</td>
                            <td class="table-td text-gray-600">${u.email}</td>
                            <td class="table-td">
                                <span class="badge badge-${currentBadge}">${currentBadge}</span>
                            </td>
                            <td class="table-td flex gap-2 items-center">
                                <select id="badge-${u.email}" class="border border-gray-300 p-1.5 rounded outline-none text-sm bg-white focus:border-blue-500 transition">
                                    <option value="FREE" ${currentBadge==='FREE'?'selected':''}>FREE</option>
                                    <option value="GO" ${currentBadge==='GO'?'selected':''}>GO</option>
                                    <option value="PLUS" ${currentBadge==='PLUS'?'selected':''}>PLUS</option>
                                    <option value="PRO" ${currentBadge==='PRO'?'selected':''}>PRO</option>
                                    <option value="Admin" ${currentBadge==='Admin'?'selected':''}>Admin</option>
                                    <option value="Owner" ${currentBadge==='Owner'?'selected':''}>Owner</option>
                                </select>
                                <button onclick="updateBadge('${u.email}')" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-700 transition font-bold shadow-sm">Save</button>
                            </td>
                        </tr>`;
                });
            } catch (e) { 
                console.error("Data load failed", e); 
            }
        }

        async function processPayment(paymentId, email, plan, action) {
            const password = localStorage.getItem('auraAdminPass');
            
            if (!confirm(action === 'approve' ? `Approve ${plan} for ${email}?` : `Reject payment?`)) {
                return;
            }
            
            try {
                const res = await fetch('/api/admin/process-payment', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': password }, 
                    body: JSON.stringify({ paymentId, email, plan, action }) 
                });
                
                if (res.ok) { 
                    alert(`Successfully ${action}d!`); 
                    loadAdminData(password); 
                } else { 
                    alert("Action failed."); 
                }
            } catch (error) { 
                alert("Connection error."); 
            }
        }

        async function updateBadge(email) {
            const badge = document.getElementById(`badge-${email}`).value;
            const password = localStorage.getItem('auraAdminPass');
            
            try {
                const res = await fetch('/api/admin/update-badge', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json', 'Authorization': password}, 
                    body: JSON.stringify({ email, badge }) 
                });
                
                if (res.ok) { 
                    alert(`Badge updated to ${badge}`); 
                    loadAdminData(password); 
                } else { 
                    alert("Failed to update."); 
                }
            } catch (error) { 
                alert("Connection error."); 
            }
        }
    </script>
</body>
</html>
