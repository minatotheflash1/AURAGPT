<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AuraGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff; }
        .input-field { width: 100%; padding: 14px 16px; border: 1px solid #c2c8d0; border-radius: 6px; font-size: 16px; margin-bottom: 16px; outline: none; }
        .input-field:focus { border-color: #10a37f; }
        .btn-primary { width: 100%; background-color: #10a37f; color: white; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div class="w-full max-w-[400px] px-8 py-10 flex flex-col items-center">
        <img src="/logo.png" alt="Logo" class="w-12 h-12 mb-10 mix-blend-darken">
        <h1 class="text-3xl font-bold mb-8 text-[#2d333a]">Welcome back</h1>
        <div class="w-full">
            <input type="email" id="email" class="input-field" placeholder="Email address" required>
            <input type="password" id="password" class="input-field" placeholder="Password" required>
            <button onclick="handleLogin()" class="btn-primary mb-4" id="loginBtn">Continue</button>
            <div class="text-center text-sm text-[#10a37f] cursor-pointer hover:underline" onclick="window.location.href='/register'">
                Don't have an account? Sign up
            </div>
        </div>
    </div>
    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("Enter email and password.");
            
            document.getElementById('loginBtn').innerText = "Logging in...";
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('auraUserEmail', data.email);
                    window.location.href = "/chat";
                } else {
                    alert(data.error);
                }
            } catch (e) { alert("Login failed."); }
            document.getElementById('loginBtn').innerText = "Continue";
        }
    </script>
</body>
</html>
