<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff; color: #0d0d0d; margin: 0; padding: 0; }
        .sidebar { background-color: #f9f9f9; width: 260px; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid #e5e5e5; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: #0d0d0d; font-size: 14px; transition: background-color 0.2s; margin-bottom: 2px; }
        .sidebar-item:hover { background-color: #ececec; }
        .sidebar-item i { width: 20px; text-align: center; color: #4d4d4d; font-size: 16px; }
        .header-icon { color: #4d4d4d; cursor: pointer; font-size: 18px; padding: 8px; border-radius: 6px; transition: 0.2s; }
        .header-icon:hover { background-color: #f3f3f3; }
        .get-plus-btn { background-color: #f4f0ff; color: #8e59ff; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; cursor: pointer; border: none; transition: 0.2s; }
        .get-plus-btn:hover { background-color: #ebe4ff; }
        .input-wrapper { background-color: #f4f4f4; border-radius: 30px; display: flex; align-items: center; padding: 8px 12px; max-width: 750px; width: 100%; margin: 0 auto; box-shadow: 0 0 15px rgba(0,0,0,0.02); }
        .input-wrapper input { background: transparent; border: none; outline: none; flex-grow: 1; font-size: 16px; padding: 8px 12px; color: #0d0d0d; }
        .input-wrapper input::placeholder { color: #8e8e8e; }
        .round-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .send-btn { background-color: #000; color: #fff; }
        .icon-btn { color: #4d4d4d; font-size: 18px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { background-color: #e5e5e5; }
        #chatWindow::-webkit-scrollbar { width: 6px; }
        #chatWindow::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="sidebar hidden md:flex p-3">
        <div class="flex justify-between items-center mb-6 px-2 pt-2">
            <div class="flex items-center gap-2">
                <img src="/logo.png" alt="AuraGPT Logo" class="w-8 h-8 object-contain mix-blend-darken">
            </div>
            <i class="fa-solid fa-bars-staggered header-icon text-gray-500"></i>
        </div>

        <div class="flex-grow flex flex-col mt-2">
            <div class="sidebar-item font-medium"><i class="fa-regular fa-pen-to-square" style="color:#000;"></i> New chat</div>
            <div class="mt-4">
                <div class="sidebar-item"><i class="fa-solid fa-magnifying-glass"></i> Search chats</div>
                <div class="sidebar-item"><i class="fa-regular fa-image"></i> Images</div>
                <div class="sidebar-item"><i class="fa-solid fa-table-cells-large"></i> Apps</div>
                <div class="sidebar-item"><i class="fa-solid fa-microscope"></i> Deep research</div>
                <div class="sidebar-item"><i class="fa-solid fa-code"></i> Codex</div>
                <div class="sidebar-item"><i class="fa-regular fa-folder-open"></i> Projects</div>
            </div>
        </div>

        <div class="mt-auto pt-4 text-[13px] text-gray-500 font-medium px-3 pb-2">
            Your chats
        </div>
    </div>

    <div class="flex-1 flex flex-col relative h-full bg-white">
        
        <header class="flex justify-between items-center px-4 py-3">
            <div class="flex items-center gap-2 cursor-pointer text-[17px] font-semibold text-gray-800 hover:bg-gray-100 px-3 py-1.5 rounded-lg transition">
                AURAGPT <i class="fa-solid fa-chevron-down text-[12px] text-gray-500"></i>
            </div>
            
            <div class="flex items-center gap-3">
                <button class="get-plus-btn">
                    <i class="fa-solid fa-sparkles"></i> Get Plus
                </button>
                <i class="fa-solid fa-user-plus header-icon"></i>
                <i class="fa-solid fa-rotate-right header-icon"></i>
            </div>
        </header>

        <div id="chatWindow" class="flex-1 flex flex-col items-center justify-start overflow-y-auto px-4 pt-20 pb-40 w-full">
            <h1 id="welcomeText" class="text-[32px] font-normal text-[#0d0d0d] mb-12">Ready when you are.</h1>
            <div id="messages" class="w-full max-w-3xl flex flex-col gap-6"></div>
        </div>

        <div class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-6 pb-6 px-4">
            <div class="input-wrapper">
                <div class="icon-btn"><i class="fa-solid fa-plus text-[20px]"></i></div>
                <input type="text" id="userInput" placeholder="Ask anything">
                <div class="flex items-center gap-2 pr-1">
                    <div class="icon-btn"><i class="fa-solid fa-microphone text-[18px]"></i></div>
                    <div onclick="generateVideo()" class="round-btn send-btn hover:bg-gray-800 transition">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5v14M7 5v14M22 9v6M2 9v6"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const welcomeText = document.getElementById('welcomeText');
        const messages = document.getElementById('messages');
        const userInput = document.getElementById('userInput');

        async function generateVideo() {
            const prompt = userInput.value;
            if(!prompt) return;

            welcomeText.style.display = 'none';
            appendMessage('user', prompt);
            userInput.value = '';

            const loadingId = "loader-" + Date.now();
            appendMessage('ai', "Thinking...", loadingId);

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt })
                });
                const task = await res.json();
                
                if(task.id) {
                    document.getElementById(loadingId).innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Generating your video...`;
                    pollStatus(task.id, loadingId);
                }
            } catch (e) {
                document.getElementById(loadingId).innerText = "Error: API Connection failed.";
            }
        }

        function appendMessage(role, content, id = null) {
            const div = document.createElement('div');
            div.className = `w-full flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            if(id) bubble.id = id;
            bubble.className = role === 'user' 
                ? 'bg-[#f4f4f4] text-[#0d0d0d] px-5 py-3 rounded-3xl max-w-[70%] text-[16px]' 
                : 'text-[#0d0d0d] py-3 max-w-[100%] text-[16px] leading-relaxed';
            
            bubble.innerHTML = content;
            div.appendChild(bubble);
            messages.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return bubble;
        }

        async function pollStatus(taskId, loadingId) {
            const interval = setInterval(async () => {
                const res = await fetch(`/api/status/${taskId}`);
                const data = await res.json();

                if(data.status === 'SUCCEEDED') {
                    clearInterval(interval);
                    document.getElementById(loadingId).innerHTML = `
                        <video src="${data.output[0]}" controls autoplay loop class="rounded-xl w-full max-w-2xl shadow-md border border-gray-200 mt-2"></video>
                    `;
                } else if(data.status === 'FAILED') {
                    clearInterval(interval);
                    document.getElementById(loadingId).innerText = "Failed to generate video.";
                }
            }, 5000);
        }

        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") generateVideo();
        });
    </script>
</body>
</html>
