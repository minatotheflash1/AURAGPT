<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff; color: #0d0d0d; margin: 0; padding: 0; }
        .sidebar { background-color: #f9f9f9; width: 260px; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid #e5e5e5; transition: transform 0.3s ease; }
        .sidebar.active { display: flex !important; position: absolute; z-index: 50; box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: #0d0d0d; font-size: 14px; transition: background-color 0.2s; margin-bottom: 2px; }
        .sidebar-item:hover { background-color: #ececec; }
        .history-item { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; color: #4b5563; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .history-item:hover { background-color: #e5e7eb; }
        .header-icon { color: #4d4d4d; cursor: pointer; font-size: 18px; padding: 8px; border-radius: 6px; transition: 0.2s; }
        .get-plus-btn { background-color: #f4f0ff; color: #8e59ff; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; cursor: pointer; border: none; }
        .input-wrapper { background-color: #f4f4f4; border-radius: 30px; display: flex; align-items: center; padding: 8px 12px; max-width: 750px; width: 100%; margin: 0 auto; box-shadow: 0 0 15px rgba(0,0,0,0.02); }
        .input-wrapper input { background: transparent; border: none; outline: none; flex-grow: 1; font-size: 16px; padding: 8px 12px; color: #0d0d0d; width: 100%; }
        .round-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background-color: #000; color: #fff; transition: 0.2s;}
        .icon-btn { color: #666; font-size: 18px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .icon-btn.active { color: #8e59ff; background-color: #f4f0ff; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .plan-card { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div class="sidebar hidden md:flex p-3" id="sidebar">
        <div class="flex justify-between items-center mb-6 px-2 pt-2">
            <img src="/logo.png" alt="AuraGPT Logo" class="w-8 h-8 object-contain mix-blend-darken">
            <i class="fa-solid fa-xmark header-icon text-gray-500 md:hidden" onclick="toggleSidebar()"></i>
        </div>
        <div class="sidebar-item font-medium border border-gray-200"><i class="fa-regular fa-pen-to-square" style="color:#000;"></i> New chat</div>
        
        <div class="flex-grow overflow-y-auto mt-4 px-1 space-y-1" id="chatHistoryList">
            <p class="text-xs text-gray-400 font-bold px-2 mb-2 uppercase tracking-wider">Recent</p>
            </div>

        <div class="sidebar-item text-red-500 mt-auto" onclick="logout()"><i class="fa-solid fa-power-off"></i> Logout</div>
    </div>

    <div class="flex-1 flex flex-col relative h-full bg-white w-full">
        <header class="flex justify-between items-center px-4 py-3">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-bars-staggered header-icon text-gray-500" onclick="toggleSidebar()"></i>
                <div class="cursor-pointer text-[17px] font-semibold text-gray-800">AURAGPT</div>
            </div>
            <button class="get-plus-btn" onclick="openPaymentModal()"><i class="fa-solid fa-sparkles"></i> Get Plus</button>
        </header>

        <div id="chatWindow" class="flex-1 flex flex-col items-center justify-start overflow-y-auto px-4 pt-10 pb-40 w-full">
            <h1 id="welcomeText" class="text-[32px] font-normal text-[#0d0d0d] mb-12">Ready when you are.</h1>
            <div id="messages" class="w-full max-w-3xl flex flex-col gap-6"></div>
        </div>

        <div class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-6 pb-6 px-4">
            <div class="input-wrapper">
                <div class="flex gap-1 pr-2 border-r border-gray-300">
                    <div class="icon-btn active" id="modeChat" onclick="setMode('chat')"><i class="fa-solid fa-message"></i></div>
                    <div class="icon-btn" id="modePhoto" onclick="setMode('photo')"><i class="fa-solid fa-image"></i></div>
                    <div class="icon-btn" id="modeVideo" onclick="setMode('video')"><i class="fa-solid fa-film"></i></div>
                </div>
                <input type="text" id="userInput" placeholder="Ask anything (DeepSeek)..." class="ml-2" oninput="toggleSendIcon()">
                <div class="flex items-center gap-2 pr-1 ml-2">
                    <div id="micBtn" onclick="startVoiceRecognition()" class="icon-btn hover:bg-gray-200"><i class="fa-solid fa-microphone"></i></div>
                    <div id="sendBtn" onclick="processRequest()" class="round-btn hover:bg-gray-800 hidden">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl relative">
            <i class="fa-solid fa-xmark absolute top-4 right-4 text-xl cursor-pointer text-gray-500" onclick="closePaymentModal()"></i>
            <h2 class="text-2xl font-bold mb-4 text-center">Upgrade to AuraGPT</h2>
            
            <div class="grid grid-cols-3 gap-2 mb-6 text-center">
                <div id="plan-GO" onclick="selectPlan('GO')" class="plan-card border rounded-lg p-2 cursor-pointer hover:border-purple-500">
                    <div class="font-bold">GO</div><div class="text-sm">50৳</div><div class="text-[10px] text-gray-500">5 Videos</div>
                </div>
                <div id="plan-PLUS" onclick="selectPlan('PLUS')" class="plan-card border rounded-lg p-2 cursor-pointer border-purple-500 bg-purple-50">
                    <div class="font-bold text-purple-700">PLUS</div><div class="text-sm">200৳</div><div class="text-[10px] text-gray-500">20 Videos</div>
                </div>
                <div id="plan-PRO" onclick="selectPlan('PRO')" class="plan-card border rounded-lg p-2 cursor-pointer hover:border-purple-500">
                    <div class="font-bold">PRO</div><div class="text-sm">500৳</div><div class="text-[10px] text-gray-500">Unlimited</div>
                </div>
            </div>

            <div class="bg-gray-100 p-4 rounded-xl mb-4 text-center">
                <p class="text-sm text-gray-600 mb-2">Send money via bKash / Nagad to:</p>
                <span class="text-xl font-bold tracking-wider">+8801846849460</span>
                <button onclick="navigator.clipboard.writeText('+8801846849460'); alert('Copied!')" class="bg-gray-300 px-3 py-1 rounded text-sm ml-2">Copy</button>
            </div>
            <div class="space-y-3">
                <input type="text" id="userPhone" placeholder="Your bKash/Nagad Number" class="w-full p-3 border rounded-lg outline-none focus:border-purple-500">
                <input type="text" id="trxId" placeholder="Transaction ID (TrxID)" class="w-full p-3 border rounded-lg outline-none focus:border-purple-500">
                <button onclick="submitPayment()" id="submitPayBtn" class="w-full bg-[#10a37f] text-white font-bold p-3 rounded-lg hover:bg-[#0d8c6d]">Submit for Review</button>
            </div>
        </div>
    </div>

    <script>
        const userEmail = localStorage.getItem('auraUserEmail');
        if(!userEmail) window.location.href = '/';

        let currentMode = 'chat';
        let selectedPlan = 'PLUS'; // Default selected plan

        // Load History on Startup
        async function loadHistory() {
            try {
                const res = await fetch(`/api/history?email=${userEmail}`);
                const historyList = await res.json();
                const container = document.getElementById('chatHistoryList');
                
                if(historyList.length > 0) {
                    historyList.forEach(item => {
                        const icon = item.type === 'video' ? 'fa-film' : (item.type === 'photo' ? 'fa-image' : 'fa-message');
                        container.innerHTML += `<div class="history-item"><i class="fa-solid ${icon} mr-2 text-gray-400"></i>${item.prompt}</div>`;
                    });
                } else {
                    container.innerHTML += `<div class="text-xs text-gray-400 px-2">No history yet.</div>`;
                }
            } catch (e) { console.error("History load failed"); }
        }
        
        window.onload = loadHistory;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openPaymentModal() { document.getElementById('paymentModal').classList.add('active'); }
        function closePaymentModal() { document.getElementById('paymentModal').classList.remove('active'); }
        function logout() { localStorage.removeItem('auraUserEmail'); window.location.href = '/'; }

        // --- Plan Selection Logic ---
        function selectPlan(plan) {
            selectedPlan = plan;
            document.querySelectorAll('.plan-card').forEach(el => {
                el.classList.remove('border-purple-500', 'bg-purple-50');
                el.querySelector('.font-bold').classList.remove('text-purple-700');
            });
            const activeCard = document.getElementById('plan-' + plan);
            activeCard.classList.add('border-purple-500', 'bg-purple-50');
            activeCard.querySelector('.font-bold').classList.add('text-purple-700');
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.icon-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
            const placeholder = mode === 'chat' ? "Ask anything (DeepSeek)..." : (mode === 'photo' ? "Describe photo..." : "Describe video (Runway)...");
            document.getElementById('userInput').placeholder = placeholder;
        }

        function toggleSendIcon() {
            const inputVal = document.getElementById('userInput').value.trim();
            const micBtn = document.getElementById('micBtn');
            const sendBtn = document.getElementById('sendBtn');
            if(inputVal.length > 0) { micBtn.classList.add('hidden'); sendBtn.classList.remove('hidden'); } 
            else { micBtn.classList.remove('hidden'); sendBtn.classList.add('hidden'); }
        }

        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Voice input not supported in this browser.");
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; 
            const micIcon = document.querySelector('#micBtn i');
            micIcon.classList.remove('fa-microphone'); micIcon.classList.add('fa-microphone-lines', 'text-red-500');
            recognition.onresult = function(event) {
                document.getElementById('userInput').value += event.results[0][0].transcript + " ";
                toggleSendIcon();
            };
            recognition.onend = function() {
                micIcon.classList.add('fa-microphone'); micIcon.classList.remove('fa-microphone-lines', 'text-red-500');
            };
            recognition.start();
        }

        async function processRequest() {
            const prompt = document.getElementById('userInput').value;
            if(!prompt) return;

            document.getElementById('welcomeText').style.display = 'none';
            appendMessage('user', prompt);
            
            // Add to sidebar instantly for good UX
            const icon = currentMode === 'video' ? 'fa-film' : (currentMode === 'photo' ? 'fa-image' : 'fa-message');
            document.getElementById('chatHistoryList').insertAdjacentHTML('afterbegin', `<div class="history-item"><i class="fa-solid ${icon} mr-2 text-gray-400"></i>${prompt}</div>`);
            
            document.getElementById('userInput').value = '';
            toggleSendIcon();

            const loadingId = "loader-" + Date.now();
            appendMessage('ai', "Thinking...", loadingId);

            try {
                const res = await fetch('/api/request', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt, type: currentMode, userEmail })
                });
                const data = await res.json();
                
                if(data.reply) { document.getElementById(loadingId).innerText = data.reply; } 
                else if(data.id) { document.getElementById(loadingId).innerHTML = `Generating video... (Task ID: ${data.id})`; }
            } catch (e) { document.getElementById(loadingId).innerText = "Error: Connection failed."; }
        }

        function appendMessage(role, content, id = null) {
            const div = document.createElement('div');
            div.className = `w-full flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const bubble = document.createElement('div');
            if(id) bubble.id = id;
            bubble.className = role === 'user' ? 'bg-[#f4f4f4] text-[#0d0d0d] px-5 py-3 rounded-3xl max-w-[70%]' : 'text-[#0d0d0d] py-3 max-w-[100%]';
            bubble.innerHTML = content;
            div.appendChild(bubble);
            document.getElementById('messages').appendChild(div);
            document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
        }

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") { e.preventDefault(); processRequest(); }
        });

        async function submitPayment() {
            const phone = document.getElementById('userPhone').value;
            const trxId = document.getElementById('trxId').value;
            if(!phone || !trxId) return alert("Fill all details");
            
            document.getElementById('submitPayBtn').innerText = "Submitting...";
            const res = await fetch('/api/submit-payment', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                // আমরা এখন সিলেক্ট করা প্ল্যানটিও পাঠাচ্ছি
                body: JSON.stringify({ userEmail, phone, trxId, plan: selectedPlan }) 
            });
            if(res.ok) {
                alert(`Request for ${selectedPlan} plan sent to Admin!`); 
                closePaymentModal();
            } else { alert("Failed. TrxID might exist."); }
            document.getElementById('submitPayBtn').innerText = "Submit for Review";
        }
    </script>
</body>
</html>
